# Core simulation
initial_servers=10
total_cycles=10000
initial_queue_multiplier=100

# Request generation
min_job_time=2
max_job_time=12
arrival_percent=35
streaming_percent=30
random_seed=42

# Scaling policy
scale_cooldown_cycles=25

# Output
color_output=true
log_file=logs/simulation.log

# Firewall (repeat key for multiple ranges)
blocked_range=10.0.0.1-10.0.0.255
blocked_range=192.168.1.10-192.168.1.20
